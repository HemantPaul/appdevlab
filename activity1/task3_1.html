<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration page</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin: 0%;
            padding: 0%;
            /* viewport height */
            height: 100vh;  
            display: flex;
            justify-content: center;
            align-items: center;
        }
       
        .card{
            background-color: #d5d4d4;
            border-radius: 10px;
            padding: 30px;
            width: 300px;
        }
        h2{
            color: #1a50a0;
            text-align: center;
            margin-bottom: 20px;
        }
        h3{
            color: #1a50a0;
            margin-bottom: 10px;
        }
        form{
            display: flex;
            flex-direction: column;
            /* gap: 10px; */
        }
        input{
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
            background-color: #b9c4cf;
            /* border: none; */
            border: 2px solid blue;
        }
        input:hover{
            background-color: #aeb9c6;
        }
        
        button{
           background-color: #7293ff;
           color: aliceblue; 
           padding: 10px;
           border-radius: 10px;
        }
        button:hover{
            background-color: #f12323;
        }
    </style>
</head>
<body>
    
 <div class="card">
     <h2>REGISTRATION</h2>
     <form>

        <h3>Login / Password</h3>

        <input type="email" name="" id="" placeholder="Email">
        <input type="password" name="" id="" placeholder="Password">


        <h3>Personal Information</h3>

        <input type="text" name="" id="" placeholder="Full Name">
        <input type="text" name="" id="" placeholder="Mobile Number">
        <input type="text" name="" id="" placeholder="Address">


        <h3>Academic Information</h3>

        <input type="text" name="" id="" placeholder="Course">
        <input type="text" name="" id="" placeholder="College Name">
        <input type="text" name="" id="" placeholder="Year">


        <h3>Professional Information</h3>

        <input type="text" name="" id="" placeholder="Training">
        <input type="text" name="" id="" placeholder="Placement">

        <button type="submit">register</button>


</form>

 </div>

</body>
</html>
