<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration page</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin: 0%;
            padding: 0%;
            /* viewport height */
            height: 100vh;  
            display: flex;
            justify-content: center;
            align-items: center;
        }
       
        .card{
            background-color: #d5d4d4;
            border-radius: 10px;
            padding: 30px;
            width: 350px;
        }
        h2{
            color: #1a50a0;
            text-align: center;
            margin-bottom: 20px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        fieldset{
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid blue;
            padding: 10px;
        }
        legend{
            color: #1a50a0;
            font-size: 14px;
        }
        input{
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background-color: #b9c4cf;
            border: 2px solid blue;
            width: 100%;
        }
        input:hover{
            background-color: #aeb9c6;
        }
        
        button{
           background-color: #7293ff;
           color: aliceblue; 
           padding: 10px;
           border-radius: 10px;
        }
        button:hover{
            background-color: #f12323;
        }
    </style>
</head>
<body>
    
 <div class="card">
     <h2>REGISTRATION</h2>
     <form>

        <fieldset>
            <legend>Login / Password</legend>

            <input type="email" name="" id="" placeholder="Email">
            <input type="password" name="" id="" placeholder="Password">
        </fieldset>


        <fieldset>
            <legend>Personal Information</legend>

            <input type="text" name="" id="" placeholder="Full Name">
            <input type="date" name="" id="" placeholder="Date of Birth">
            <input type="text" name="" id="" placeholder="Mobile Number">
        </fieldset>


        <fieldset>
            <legend>Academic Information</legend>

            <input type="text" name="" id="" placeholder="Course">
            <input type="text" name="" id="" placeholder="College Name">
            <input type="text" name="" id="" placeholder="Year of Study">
        </fieldset>


        <fieldset>
            <legend>Professional Information</legend>

            <input type="text" name="" id="" placeholder="Training Details">
            <input type="text" name="" id="" placeholder="Placement Status">
        </fieldset>

        <button type="submit">register</button>

     </form>

 </div>

</body>
</html>
