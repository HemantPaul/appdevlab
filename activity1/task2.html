<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 2</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0%;
            padding: 0%;
        }

        table{
            border-collapse: collapse;
            margin: 20px;
        }

        td{
            border: 1px solid green;
            padding: 15px;
            text-align: center;
        }

        .inner td{
            border: 2px solid blue;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td rowspan="2">Table 1</td>
        <td colspan="2">Table 1</td>
    </tr>

    <tr>
        <td colspan="2">
            <table class="inner">
                <tr>
                    <td>Table 2</td>
                    <td>Table 2</td>
                </tr>

                <tr>
                    <td>Table 2</td>
                    <td>Table 2</td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <td>Table 1</td>
        <td colspan="2">Table 1</td>
    </tr>
</table>

</body>
</html>
